# Tier-1: Prostate Cancer Triage & Enrichment

pipeline_tier: 1
pipeline_name: "PCa_Triage_GoldStandard"

discovery:
  mode: KEYWORD
  queries:
    - >
      ("Prostatic Neoplasms"[MeSH Terms]
      OR prostate[tiab]
      OR prostatic[tiab]
      OR "prostate cancer"[tiab])
      AND
      ("spatial transcriptom*"[tiab] OR "spatial gene expression"[tiab]
      OR "spatial multiomic*"[tiab] OR "spatial omics"[tiab]
      OR "spatial multi-omics"[tiab]
      OR Visium[tiab] OR Xenium[tiab] OR CosMx[tiab] OR GeoMx[tiab]
      OR "Slide-seq"[tiab] OR "SlideSeq"[tiab]
      OR "spatial ATAC"[tiab] OR "spatial-ATAC"[tiab]
      OR "single-cell"[tiab] OR "single cell"[tiab]
      OR "single-nucleus"[tiab] OR "single nucleus"[tiab]
      OR scRNA*[tiab] OR snRNA*[tiab] OR scATAC*[tiab] OR snATAC*[tiab]
      OR multiome[tiab] OR "10x multiome"[tiab]
      OR pseudotime[tiab] OR "trajectory inference"[tiab] OR "RNA velocity"[tiab])
      AND ("Journal Article"[pt]
      NOT "Review"[pt]
      NOT "Editorial"[pt]
      NOT "Comment"[pt]
      NOT "Letter"[pt]
      NOT "News"[pt]
      NOT "Case Reports"[pt])
      AND english[la]
      NOT "Preprint"[Publication Type]
  retmax: 20
  reldays: 120

ai:
  provider: openai  # or gemini
  model_default: "gpt-5-nano"
  model_escalate: "gpt-5-mini"
  max_chars: 80000
  prompt_template: "tier1_pca"  # maps to internal template
  escalation_triggers:
    score_range: [70, 84]       # Ambiguous relevance -> use mini

    # Complexity Triggers (Machine Checkable)
    min_chars: 35000            # >8-10k tokens (approx) -> Complex full text
    min_modalities: 3           # Requires >=3 keywords below to verify multi-omics
    modality_keywords:          
      - "scRNA"
      - "snRNA"
      - "scATAC"
      - "snATAC"
      - "spatial"
      - "Visium"
      - "Xenium"
      - "CosMx"
      - "Multiome"
      - "Multi-omic"
      - "sc multi-omic"

    # Behavior
    retry_on_error: true        # Malformed JSON -> retry with mini
    escalate_on_high_reuse: 4   # If Nano predicts ReuseScore >= 4, re-run with Mini

storage:
  notion:
    enabled: true
    database_id_env: "NOTION_DB_ID"
  drive:
    enabled: true
  csv:
    enabled: true
    filename: "papers_tier1.csv"

dedup:
  keys: ["DOI", "PMID"]
