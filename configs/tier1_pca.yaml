# Tier-1: Prostate Cancer Triage & Enrichment

pipeline_tier: 1
pipeline_name: "PCa_Triage_GoldStandard"

discovery:
  mode: KEYWORD
  queries:
    - '(("prostate cancer"[Title/Abstract] OR "PCa"[Title/Abstract]) AND ("spatial"[Title/Abstract] OR "single-cell"[Title/Abstract] OR "scRNA"[Title/Abstract] OR "snRNA"[Title/Abstract] OR "multiome"[Title/Abstract]))'
  retmax: 50
  reldays: 120

ai:
  provider: openai  # or gemini
  model_default: "gpt-5-nano"
  model_escalate: "gpt-5-mini"
  max_chars: 80000
  prompt_template: "tier1_pca"  # maps to internal template

storage:
  notion:
    enabled: true
    database_id_env: "NOTION_DB_ID"
  drive:
    enabled: true
    folder_id_env: "GOOGLE_DRIVE_FOLDER_ID"
    markdown_grouping: "Quarterly" # Quarterly, Monthly, or None
  csv:
    enabled: true
    filename: "papers_tier1.csv"

dedup:
  keys: ["DOI", "PMID"]
