# Tier-1: Prostate Cancer Triage & Enrichment

pipeline_tier: 1
pipeline_name: "PCa_Triage_GoldStandard"

discovery:
  mode: KEYWORD
  queries:
    - >
      ("Prostatic Neoplasms"[MeSH Terms]
      OR prostate[tiab]
      OR prostatic[tiab]
      OR "prostate cancer"[tiab])
      AND
      ("spatial transcriptom*"[tiab] OR "spatial gene expression"[tiab]
      OR "spatial multiomic*"[tiab] OR "spatial omics"[tiab]
      OR "spatial multi-omics"[tiab]
      OR Visium[tiab] OR Xenium[tiab] OR CosMx[tiab] OR GeoMx[tiab]
      OR "Slide-seq"[tiab] OR "SlideSeq"[tiab]
      OR "spatial ATAC"[tiab] OR "spatial-ATAC"[tiab]
      OR "single-cell"[tiab] OR "single cell"[tiab]
      OR "single-nucleus"[tiab] OR "single nucleus"[tiab]
      OR scRNA*[tiab] OR snRNA*[tiab] OR scATAC*[tiab] OR snATAC*[tiab]
      OR multiome[tiab] OR "10x multiome"[tiab]
      OR pseudotime[tiab] OR "trajectory inference"[tiab] OR "RNA velocity"[tiab])
      AND ("Journal Article"[pt]
      NOT "Review"[pt]
      NOT "Editorial"[pt]
      NOT "Comment"[pt]
      NOT "Letter"[pt]
      NOT "News"[pt]
      NOT "Case Reports"[pt])
      AND english[la]
      NOT "Preprint"[Publication Type]
  retmax: 25
  reldays: 180

ai:
  provider: openai
  # Two-Pass Architecture Config
  pass1_model_fulltext: "gpt-5-mini"  # Pass 1 (Scoring) if Full Text
  pass1_model_abstract: "gpt-5-nano"  # Pass 1 (Scoring) if Abstract Only
  pass2_model: "gpt-5-mini"           # Pass 2 (Methods extraction)
  pass2_min_score: 88                 # Trigger threshold for Pass 2 (score >= 88)

  max_chars: 80000
  prompt_template: "tier1_pca"
  escalation_triggers:
    score_range: [70, 79]       # H2: Ambiguous relevance range
    min_rationale_length: 50    # H1: Short rationale threshold
    escalate_on_high_reuse: 4   # H4: High Reuse Score
    h3_high_score_thresh: 80    # H3: High score threshold for mismatch check
    h3_low_score_thresh: 70     # H3: Low score threshold for mismatch check
    escalate_min_score: 87      # H5: Direct escalation for High Tier 3+ (Score >= 88)


    # Upfront escalation (Handled by Two-Pass Logic now)
    # min_chars: removed - implies Pass 1 Full Text mode
    # min_modalities: removed - implies Pass 1 Full Text mode

    # Behavior
    retry_on_error: true        # Malformed JSON -> retry with mini

storage:
  notion:
    enabled: true
    database_id_env: "NOTION_DB_ID"
  drive:
    enabled: true
  csv:
    enabled: true
    filename: "papers_tier1.csv"

dedup:
  keys: ["DOI", "PMID"]
